<!DOCTYPE html>
<html>

<head>
    <title>Add Student</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="container mt-4">

    <h2>Add Student</h2>

    <form method="POST">

        <div class="mb-3">
            <label>Student ID</label>
            <input name="student_id" class="form-control">
        </div>

        <div class="mb-3">
            <label>Name</label>
            <input name="name" class="form-control">
        </div>

        <div class="mb-3">
            <label>Birth Year</label>
            <input name="birth_year" class="form-control">
        </div>

        <div class="mb-3">
            <label>Major</label>
            <input name="major" class="form-control">
        </div>

        <div class="mb-3">
            <label>GPA</label>
            <input name="gpa" class="form-control">
        </div>

        <button class="btn btn-success">
Add Student
</button>

    </form>

</body>

</html>
