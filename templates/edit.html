<!DOCTYPE html>
<html>

<head>
    <title>Edit Student</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="container mt-4">

    <h2>Edit Student</h2>

    <form method="POST">

        <div class="mb-3">
            <label>Student ID</label>
            <input name="student_id" value="{{student.student_id}}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Name</label>
            <input name="name" value="{{student.name}}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Birth Year</label>
            <input name="birth_year" value="{{student.birth_year}}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Major</label>
            <input name="major" value="{{student.major}}" class="form-control">
        </div>

        <div class="mb-3">
            <label>GPA</label>
            <input name="gpa" value="{{student.gpa}}" class="form-control">
        </div>

        <button class="btn btn-primary">
Update Student
</button>

    </form>

</body>

</html>
